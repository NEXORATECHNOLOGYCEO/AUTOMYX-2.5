<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taxi Sendan - Servicios de Transporte</title>
    
    <!-- Estilos CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Hoja de estilos de Leaflet (Mapa) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Fuente Google Fonts (Inter para UI moderna) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <!-- Overlay de Carga -->
    <div id="loading-overlay">
        <div class="loader-content">
            <div class="spinner"></div>
            <p>Cargando el servicio...</p>
        </div>
    </div>

    <!-- Cabecera / Header -->
    <header class="app-header">
        <div class="logo-container">
            <h1>Taxi Sendan</h1>
            <span class="subtitle">Servicios InDriver Integrado</span>
        </div>
        <button id="btn-location" aria-label="Usar mi ubicación actual">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="16"></line>
                <line x1="8" y1="12" x2="16" y2="12"></line>
            </svg>
        </button>
    </header>

    <!-- Contenedor Principal del Mapa -->
    <main class="map-container">
        <div id="map"></div>
        
        <!-- Panel de Información Flotante (Oculto inicialmente) -->
        <div id="info-panel" class="info-panel hidden">
            <h2>Selecciona tu destino</h2>
            <p>Haz clic en el mapa para establecer la ruta.</p>
        </div>
    </main>

    <!-- Panel de Control Inferior (Reserva) -->
    <footer class="control-panel">
        <div class="input-group">
            <label for="pickup">Punto de Partida</label>
            <input type="text" id="pickup" placeholder="Detectando ubicación..." readonly>
        </div>
        <div class="input-group">
            <label for="destination">Destino</label>
            <input type="text" id="destination" placeholder="¿A dónde vas?">
        </div>
        <button id="btn-request" class="btn-primary">Solicitar Taxi</button>
    </footer>

    <!-- Scripts en orden de carga -->
    
    <!-- 1. Configuración Global (Leaflet/Mapbox) -->
    <script src="js/config.js"></script>
    
    <!-- 2. Lógica Principal del Mapa y App -->
    <script src="js/app.js"></script>
    
    <!-- 3. Utilidades de Diagnóstico -->
    <script src="js/debug.js"></script>

</body>
</html>
